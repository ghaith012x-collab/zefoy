<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zefoy Bot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 20px; color: #fff; }

        .counter-box {
            background: linear-gradient(135deg, #1a2a1a, #0f1f0f);
            border: 2px solid #00e676;
            border-radius: 16px;
            padding: 20px 40px;
            margin-bottom: 20px;
            text-align: center;
            min-width: 280px;
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.15);
        }
        .counter-label { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .counter-value { font-size: 3rem; font-weight: 800; color: #00e676; font-variant-numeric: tabular-nums; transition: transform 0.2s; }
        .counter-value.bump { transform: scale(1.15); }
        .counter-cycles { font-size: 0.9rem; color: #666; margin-top: 6px; }
        .counter-timer { font-size: 1rem; color: #ff9800; margin-top: 10px; font-weight: 600; }
        .counter-timer.hidden { display: none; }

        .container { width: 100%; max-width: 500px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: #4a90d9; }
        button { padding: 12px 24px; border: none; border-radius: 8px; background: #4a90d9; color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; white-space: nowrap; }
        button:hover { background: #3a7bc8; }
        button:disabled { background: #333; cursor: not-allowed; }
        .status { padding: 10px 16px; border-radius: 8px; background: #1a1a1a; margin-bottom: 10px; font-weight: 500; border-left: 3px solid #4a90d9; }
        .status.success { border-left-color: #00e676; color: #00e676; }
        .status.error { border-left-color: #ff5252; color: #ff5252; }
        .status.wait { border-left-color: #ff9800; color: #ff9800; }
        #log { max-height: 400px; overflow-y: auto; }
        .log-entry { padding: 6px 12px; margin: 4px 0; border-radius: 4px; background: #1a1a1a; font-size: 0.9rem; color: #aaa; }
        .log-entry.highlight { color: #00e676; background: #1a2a1a; }
    </style>
</head>
<body>
    <h1>⚡ Zefoy Views Bot</h1>

    <div class="counter-box" id="counterBox">
        <div class="counter-label">Total Views Sent</div>
        <div class="counter-value" id="counterValue">0</div>
        <div class="counter-cycles" id="counterCycles">Waiting to start...</div>
        <div class="counter-timer hidden" id="counterTimer"></div>
    </div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="url" placeholder="Paste TikTok URL...">
            <button id="startBtn" onclick="startBot()">Start</button>
        </div>
        <div id="status" class="status" style="display:none"></div>
        <div id="log"></div>
    </div>

    <script>
        let totalViews = 0;
        let cycleCount = 0;
        let countdownInterval = null;

        function animateCounter(target) {
            const el = document.getElementById('counterValue');
            const start = parseInt(el.textContent) || 0;
            const diff = target - start;
            if (diff <= 0) { el.textContent = target; return; }
            const steps = 30;
            const stepTime = 600 / steps;
            let current = start;
            let i = 0;
            const timer = setInterval(() => {
                i++;
                current = Math.round(start + (diff * (i / steps)));
                el.textContent = current.toLocaleString();
                if (i >= steps) {
                    clearInterval(timer);
                    el.textContent = target.toLocaleString();
                    // Bump animation
                    el.classList.add('bump');
                    setTimeout(() => el.classList.remove('bump'), 200);
                }
            }, stepTime);
        }

        function startCountdown(seconds) {
            clearInterval(countdownInterval);
            const timerEl = document.getElementById('counterTimer');
            timerEl.classList.remove('hidden');
            let remaining = seconds;

            function update() {
                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                timerEl.textContent = '⏳ Next cycle in ' + (m > 0 ? m + 'm ' : '') + s + 's';
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    timerEl.classList.add('hidden');
                }
                remaining--;
            }
            update();
            countdownInterval = setInterval(update, 1000);
        }

        function startBot() {
            const url = document.getElementById('url').value.trim();
            if (!url) return alert('Enter a TikTok URL');

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = 'Running...';
            document.getElementById('log').innerHTML = '';
            document.getElementById('status').style.display = 'block';
            document.getElementById('counterCycles').textContent = 'Starting...';
            totalViews = 0;
            cycleCount = 0;
            document.getElementById('counterValue').textContent = '0';

            fetch('/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            }).then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                function read() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            btn.disabled = false;
                            btn.textContent = 'Start';
                            clearInterval(countdownInterval);
                            document.getElementById('counterTimer').classList.add('hidden');
                            document.getElementById('counterCycles').textContent = 'Done — ' + cycleCount + ' cycle' + (cycleCount !== 1 ? 's' : '') + ' completed';
                            return;
                        }

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            const data = line.slice(6).trim();

                            if (data === 'DONE') {
                                btn.disabled = false;
                                btn.textContent = 'Start';
                                clearInterval(countdownInterval);
                                document.getElementById('counterTimer').classList.add('hidden');
                                document.getElementById('counterCycles').textContent = 'Done — ' + cycleCount + ' cycle' + (cycleCount !== 1 ? 's' : '') + ' completed';
                                return;
                            }

                            const pipe = data.indexOf('|');
                            if (pipe === -1) continue;

                            const step = data.substring(0, pipe);
                            const msg = data.substring(pipe + 1);
                            const statusEl = document.getElementById('status');

                            // Update status
                            statusEl.textContent = msg;
                            statusEl.className = 'status';
                            if (msg.includes('✅')) statusEl.classList.add('success');
                            else if (msg.includes('Error') || msg.includes('error')) statusEl.classList.add('error');
                            else if (msg.includes('wait') || msg.includes('Rate') || msg.includes('⏳')) statusEl.classList.add('wait');

                            // Track total views from "Total: X" in success messages
                            const totalMatch = msg.match(/Total:\s*([\d,]+)/);
                            if (totalMatch) {
                                totalViews = parseInt(totalMatch[1].replace(/,/g, ''));
                                animateCounter(totalViews);
                            }

                            // Track cycle count
                            const cycleMatch = msg.match(/Cycle\s+(\d+)/);
                            if (cycleMatch) {
                                const c = parseInt(cycleMatch[1]);
                                if (c > cycleCount) cycleCount = c;
                                document.getElementById('counterCycles').textContent = 'Cycle ' + cycleCount + ' in progress';
                            }

                            // Start countdown timer for rate limits
                            const waitMatch = msg.match(/waiting\s+(\d+)s/);
                            if (waitMatch) {
                                startCountdown(parseInt(waitMatch[1]));
                            }

                            // Success message — update cycle text
                            if (msg.includes('✅')) {
                                document.getElementById('counterCycles').textContent = cycleCount + ' cycle' + (cycleCount !== 1 ? 's' : '') + ' completed';
                            }

                            // Add to log
                            const logEl = document.getElementById('log');
                            const entry = document.createElement('div');
                            entry.className = 'log-entry';
                            if (msg.includes('✅')) entry.classList.add('highlight');
                            entry.textContent = msg;
                            logEl.insertBefore(entry, logEl.firstChild);

                            while (logEl.children.length > 50) {
                                logEl.removeChild(logEl.lastChild);
                            }
                        }
                        read();
                    });
                }
                read();
            }).catch(err => {
                document.getElementById('status').textContent = 'Connection error: ' + err;
                document.getElementById('status').className = 'status error';
                btn.disabled = false;
                btn.textContent = 'Start';
            });
        }

        document.getElementById('url').addEventListener('keydown', e => {
            if (e.key === 'Enter') startBot();
        });
    </script>
</body>
</html>
