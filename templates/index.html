<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zefoy Auto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 520px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #00d4ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }

        input {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            background: #141414;
            color: #fff;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus { border-color: #00d4ff; background: #1a1a1a; }

        .btn-row { display: flex; gap: 10px; }
        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        #go {
            background: linear-gradient(90deg, #00d4ff, #a855f7);
        }
        #stop {
            background: #333;
            display: none;
            flex: 0 0 auto;
            padding: 16px 24px;
        }
        #stop:hover { background: #ff4444; }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .stats {
            margin-top: 16px;
            display: none;
            background: #111;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 16px 20px;
            text-align: center;
        }
        .stats-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; }
        .stats-value { font-size: 32px; font-weight: 700; color: #00ff64; margin-top: 4px; }

        .log-container {
            margin-top: 16px;
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
        }
        .log-container.hidden { display: none; }
        .log-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            margin-bottom: 12px;
        }
        .log-entry {
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
            animation: fadeIn 0.3s ease;
        }
        .log-entry:last-child { border-bottom: none; }
        .log-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }
        .log-step {
            background: #1a1a1a;
            color: #888;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 6px;
            min-width: 32px;
            text-align: center;
            font-weight: 600;
        }
        .log-entry.success .log-step { background: rgba(0,255,100,0.15); color: #00ff64; }
        .log-entry.error .log-step { background: rgba(255,0,0,0.15); color: #ff4444; }
        .log-entry.active .log-step { background: rgba(0,212,255,0.15); color: #00d4ff; }
        .log-entry.wait .log-step { background: rgba(255,165,0,0.15); color: #ffa500; }
        .log-msg { flex: 1; line-height: 1.5; word-break: break-word; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zefoy Auto</h1>
        <p class="subtitle">Paste link. Watch it work live. Loops automatically.</p>
        <input type="text" id="url" placeholder="https://vm.tiktok.com/..." autocomplete="off">
        <div class="btn-row">
            <button id="go" onclick="start()">Confirm & Send Views</button>
        </div>

        <div id="stats" class="stats">
            <div class="stats-label">Total Views Sent</div>
            <div id="stats-value" class="stats-value">0</div>
        </div>

        <div id="logs" class="log-container hidden">
            <div class="log-title">Live Activity</div>
            <div id="log-content"></div>
        </div>
    </div>

    <script>
        let totalViews = 0;

        function addLog(step, msg, type='normal') {
            const content = document.getElementById('log-content');
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.innerHTML = `<div class="log-header"><span class="log-step">${step}</span><span class="log-msg">${msg}</span></div>`;
            content.appendChild(div);
            document.getElementById('logs').classList.remove('hidden');
            content.scrollTop = content.scrollHeight;

            // Keep log manageable — remove old entries beyond 50
            while (content.children.length > 50) {
                content.removeChild(content.firstChild);
            }
        }

        function updateStats(msg) {
            const match = msg.match(/Total:\s*(\d+)/);
            if (match) {
                totalViews = parseInt(match[1]);
                document.getElementById('stats-value').textContent = totalViews;
                document.getElementById('stats').style.display = 'block';
            }
        }

        function start() {
            const url = document.getElementById('url').value.trim();
            const btn = document.getElementById('go');
            const content = document.getElementById('log-content');

            if (!url) return;
            btn.disabled = true;
            content.innerHTML = '';
            totalViews = 0;
            document.getElementById('stats-value').textContent = '0';
            document.getElementById('stats').style.display = 'block';
            document.getElementById('logs').classList.remove('hidden');
            addLog('...', 'Starting automation...', 'active');

            fetch('/stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            }).then(res => {
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                function read() {
                    reader.read().then(({done, value}) => {
                        if (done) {
                            btn.disabled = false;
                            return;
                        }
                        buffer += decoder.decode(value, {stream: true});
                        const parts = buffer.split('\n\n');
                        buffer = parts.pop(); // keep incomplete chunk

                        parts.forEach(part => {
                            if (part.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(part.slice(6));
                                    let type = 'active';
                                    if (data.step === 99) type = 'error';
                                    else if (data.step === 17 || data.step === 18) type = 'success';
                                    else if (data.step === 13) type = 'wait';
                                    else if (data.done && data.step !== 99) type = 'success';

                                    addLog(data.step, data.message, type);
                                    updateStats(data.message);

                                    if (data.done) btn.disabled = false;
                                } catch(e) {}
                            }
                        });
                        read();
                    });
                }
                read();
            }).catch(e => {
                addLog('ERR', 'Connection failed: ' + e.message, 'error');
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
