<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zefoy Bot</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e0e0e0; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }
.header { background:linear-gradient(135deg,#1a1a3e,#0d0d2b); padding:20px; text-align:center; border-bottom:1px solid #2a2a5a; position:sticky; top:0; z-index:100; }
.header h1 { font-size:1.6rem; color:#a78bfa; display:inline; }
.header h1::before { content:"⚡ "; }
.header .stats { color:#888; font-size:0.9rem; margin-left:16px; }

.controls { max-width:700px; margin:20px auto; padding:0 16px; }
.control-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.control-row select, .control-row input[type="text"], .control-row input[type="number"] { background:#1a1a3e; border:1px solid #333; color:#e0e0e0; padding:10px 14px; border-radius:8px; font-size:0.95rem; }
.control-row select { min-width:120px; }
.control-row input[type="text"] { flex:1; min-width:180px; }
.control-row input[type="number"] { width:70px; text-align:center; }
.tabs-group { display:flex; align-items:center; gap:4px; }
.tabs-group label { color:#888; font-size:0.8rem; white-space:nowrap; }
.btn-start { background:linear-gradient(135deg,#6d28d9,#4f46e5); color:#fff; border:none; padding:10px 24px; border-radius:8px; cursor:pointer; font-size:0.95rem; font-weight:600; transition:all 0.2s; }
.btn-start:hover { transform:translateY(-1px); box-shadow:0 4px 15px rgba(109,40,217,0.4); }

.sessions { max-width:1200px; margin:20px auto; padding:0 16px; display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:16px; }

.card { background:#111133; border:1px solid #2a2a5a; border-radius:12px; padding:16px; position:relative; display:flex; flex-direction:column; }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; flex-wrap:wrap; gap:6px; }
.card-id { font-weight:700; color:#a78bfa; font-size:1.1rem; }
.card-badge { padding:2px 10px; border-radius:99px; font-size:0.75rem; font-weight:600; text-transform:uppercase; }
.badge-views { background:#6d28d9; color:#fff; }
.badge-comment_hearts { background:#7c3aed; color:#fff; }
.badge-shares { background:#0891b2; color:#fff; }
.badge-favorites { background:#d97706; color:#fff; }
.badge-followers { background:#059669; color:#fff; }
.badge-nreer_hearts { background:#ec4899; color:#fff; }
.card-stats { font-size:0.85rem; color:#bbb; margin-bottom:4px; }
.card-stats span { margin-right:12px; }
.card-stats .count { color:#34d399; font-weight:700; }
.card-url { font-size:0.75rem; color:#666; word-break:break-all; margin-bottom:8px; }
.card-tabs-info { font-size:0.75rem; color:#a78bfa; margin-bottom:4px; }

.status-badge { padding:2px 8px; border-radius:4px; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.status-running { background:#059669; color:#fff; }
.status-starting { background:#d97706; color:#fff; }
.status-stopping { background:#9333ea; color:#fff; }
.status-stopped { background:#555; color:#ccc; }
.status-error { background:#dc2626; color:#fff; }

.btn-stop { background:#dc2626; color:#fff; border:none; padding:4px 14px; border-radius:6px; cursor:pointer; font-size:0.8rem; font-weight:600; }
.btn-stop:hover { background:#b91c1c; }
.btn-remove { background:none; border:1px solid #555; color:#888; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:0.8rem; }
.btn-remove:hover { border-color:#dc2626; color:#dc2626; }

.log-box { background:#0a0a1a; border:1px solid #222; border-radius:8px; padding:10px; margin-top:8px; max-height:200px; overflow-y:auto; font-family:'Fira Code',monospace; font-size:0.75rem; line-height:1.6; flex:1; }
.log-box div { white-space:pre-wrap; word-break:break-word; }
.log-box .tab-prefix { color:#a78bfa; font-weight:600; }

.countdown-bar { background:#1a1a3e; border:1px solid #4f46e5; border-radius:6px; padding:6px 12px; margin-top:6px; font-size:0.85rem; color:#a78bfa; text-align:center; font-weight:600; }

@media(max-width:600px) {
    .sessions { grid-template-columns:1fr; }
    .control-row { flex-direction:column; }
    .control-row select, .control-row input[type="text"], .control-row input[type="number"] { width:100%; }
    .tabs-group { width:100%; }
    .tabs-group input { flex:1; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Zefoy Bot</h1>
    <span class="stats" id="globalStats">Active: 0 &nbsp; Total: 0</span>
</div>

<div class="controls">
    <div class="control-row">
        <select id="serviceSelect">
            <option value="views">👁️ Views</option>
            <option value="comment_hearts">💬 Comment Hearts</option>
            <option value="shares">🔄 Shares</option>
            <option value="favorites">⭐ Favorites</option>
            <option value="followers">👥 Followers</option>
            <option value="nreer_hearts">💖 Nreer Hearts</option>
        </select>
        <input type="text" id="urlInput" placeholder="Paste TikTok URL...">
        <div class="tabs-group">
            <label>Tabs:</label>
            <input type="number" id="tabsInput" value="1" min="1" max="10">
        </div>
        <button class="btn-start" onclick="startSession()">▶ Start</button>
    </div>
</div>

<div class="sessions" id="sessions"></div>

<script>
const sessionsEl = document.getElementById('sessions');
const globalStats = document.getElementById('globalStats');
const cards = {};
const MAX_LOG_LINES = 200;

const BADGE_CLASS = {views:'badge-views',comment_hearts:'badge-comment_hearts',shares:'badge-shares',favorites:'badge-favorites',followers:'badge-followers',nreer_hearts:'badge-nreer_hearts'};

function startSession() {
    const url = document.getElementById('urlInput').value.trim();
    const service = document.getElementById('serviceSelect').value;
    const tabs = parseInt(document.getElementById('tabsInput').value) || 1;
    if (!url) return alert('Paste a TikTok URL first!');

    fetch('/start', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({url, service, tabs})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) return alert(data.error);
        createCard(data);
    });
}

function createCard(s) {
    const div = document.createElement('div');
    div.className = 'card';
    div.id = 'card-' + s.id;

    const badgeCls = BADGE_CLASS[s.service] || 'badge-views';
    const tabsInfo = (s.numTabs || 1) > 1 ? `<div class="card-tabs-info">🔀 ${s.numTabs} tabs (each with unique IP)</div>` : '';

    div.innerHTML = `
        <div class="card-header">
            <span>
                <span class="card-id">#${s.id}</span>
                <span class="card-badge ${badgeCls}">${s.serviceEmoji} ${s.serviceName}</span>
            </span>
            <span>
                <button class="btn-stop" onclick="stopSession(${s.id})" id="stopBtn-${s.id}">■ Stop</button>
                <span class="status-badge status-starting" id="status-${s.id}">STARTING</span>
            </span>
        </div>
        <div class="card-stats">
            <span>${s.serviceName}: <span class="count" id="count-${s.id}">0</span></span>
            <span>Cycles: <span id="cycles-${s.id}">0</span></span>
            ${(s.numTabs || 1) > 1 ? `<span>Tabs: <span id="activetabs-${s.id}">${s.numTabs}</span>/${s.numTabs}</span>` : ''}
        </div>
        <div class="card-url">${s.url}</div>
        ${tabsInfo}
        <div class="log-box" id="log-${s.id}"></div>
        <div class="countdown-bar" id="cd-${s.id}" style="display:none"></div>
    `;
    sessionsEl.prepend(div);
    cards[s.id] = {
        log: div.querySelector('#log-' + s.id),
        count: div.querySelector('#count-' + s.id),
        cycles: div.querySelector('#cycles-' + s.id),
        status: div.querySelector('#status-' + s.id),
        stopBtn: div.querySelector('#stopBtn-' + s.id),
        cd: div.querySelector('#cd-' + s.id),
        activeTabs: div.querySelector('#activetabs-' + s.id),
        card: div,
        logCount: 0,
        numTabs: s.numTabs || 1,
    };
}

function stopSession(sid) {
    fetch('/stop/' + sid, {method:'POST'});
}

function removeSession(sid) {
    fetch('/remove/' + sid, {method:'POST'}).then(r => r.json()).then(d => {
        if (d.ok) {
            const c = document.getElementById('card-' + sid);
            if (c) c.remove();
            delete cards[sid];
        }
    });
}

function colorizeLog(text) {
    return text.replace(/\[T(\d+)\]\s*/g, '<span class="tab-prefix">[T$1]</span> ');
}

const evtSource = new EventSource('/stream/all');

evtSource.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    const sid = msg.sid;
    const c = cards[sid];

    if (!c) {
        fetch('/sessions').then(r => r.json()).then(data => {
            (data.sessions || data).forEach(s => {
                if (!cards[s.id]) createCard(s);
            });
            if (data.browsers !== undefined) _globalBrowsers = data.browsers;
            if (data.maxBrowsers !== undefined) _maxBrowsers = data.maxBrowsers;
        });
        return;
    }

    switch (msg.type) {
        case 'log':
            const line = document.createElement('div');
            line.innerHTML = colorizeLog(escapeHtml(msg.text));
            c.log.appendChild(line);
            c.logCount++;
            while (c.logCount > MAX_LOG_LINES) {
                c.log.removeChild(c.log.firstChild);
                c.logCount--;
            }
            c.log.scrollTop = c.log.scrollHeight;
            break;

        case 'countdown':
            if (msg.text) {
                c.cd.textContent = msg.text;
                c.cd.style.display = 'block';
            } else {
                c.cd.style.display = 'none';
            }
            break;

        case 'stats':
            c.count.textContent = Number(msg.count).toLocaleString();
            c.cycles.textContent = msg.cycles;
            const statusEl = c.status;
            statusEl.textContent = msg.status.toUpperCase();
            statusEl.className = 'status-badge status-' + msg.status;

            if (['stopped','error'].includes(msg.status)) {
                c.stopBtn.style.display = 'none';
            }
            break;

        case 'ended':
            c.stopBtn.outerHTML = `<button class="btn-remove" onclick="removeSession(${sid})">✕</button>`;
            break;
    }

    updateGlobalStats();
};

let _globalBrowsers = 0, _maxBrowsers = 5;
function updateGlobalStats() {
    let active = 0, total = 0;
    for (const sid in cards) {
        total++;
        const statusText = cards[sid].status?.textContent?.toLowerCase();
        if (statusText === 'running' || statusText === 'starting') active++;
    }
    globalStats.textContent = `Active: ${active}   Total: ${total}   🌐 Browsers: ${_globalBrowsers}/${_maxBrowsers}`;
}
setInterval(() => {
    fetch('/sessions').then(r => r.json()).then(data => {
        if (data.browsers !== undefined) _globalBrowsers = data.browsers;
        if (data.maxBrowsers !== undefined) _maxBrowsers = data.maxBrowsers;
        updateGlobalStats();
    }).catch(() => {});
}, 5000);

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

fetch('/sessions').then(r => r.json()).then(data => {
    (data.sessions || data).forEach(s => createCard(s));
    if (data.browsers !== undefined) _globalBrowsers = data.browsers;
    if (data.maxBrowsers !== undefined) _maxBrowsers = data.maxBrowsers;
    updateGlobalStats();
});
</script>
</body>
</html>
