<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zefoy Bot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 20px; color: #fff; }
        .total { font-size: 1.4rem; color: #00e676; margin-bottom: 15px; font-weight: bold; }
        .container { width: 100%; max-width: 500px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: #4a90d9; }
        button { padding: 12px 24px; border: none; border-radius: 8px; background: #4a90d9; color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; white-space: nowrap; }
        button:hover { background: #3a7bc8; }
        button:disabled { background: #333; cursor: not-allowed; }
        .status { padding: 10px 16px; border-radius: 8px; background: #1a1a1a; margin-bottom: 10px; font-weight: 500; border-left: 3px solid #4a90d9; }
        .status.success { border-left-color: #00e676; color: #00e676; }
        .status.error { border-left-color: #ff5252; color: #ff5252; }
        .status.wait { border-left-color: #ff9800; color: #ff9800; }
        #log { max-height: 400px; overflow-y: auto; }
        .log-entry { padding: 6px 12px; margin: 4px 0; border-radius: 4px; background: #1a1a1a; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
    <h1>⚡ Zefoy Views Bot</h1>
    <div class="total" id="totalViews" style="display:none">Total views sent: 0</div>
    <div class="container">
        <div class="input-group">
            <input type="text" id="url" placeholder="Paste TikTok URL...">
            <button id="startBtn" onclick="startBot()">Start</button>
        </div>
        <div id="status" class="status" style="display:none"></div>
        <div id="log"></div>
    </div>

    <script>
        let totalViews = 0;

        function startBot() {
            const url = document.getElementById('url').value.trim();
            if (!url) return alert('Enter a TikTok URL');

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = 'Running...';
            document.getElementById('log').innerHTML = '';
            document.getElementById('status').style.display = 'block';
            totalViews = 0;

            const es = new EventSource('/start?' + new URLSearchParams({}));

            fetch('/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            }).then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                function read() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            btn.disabled = false;
                            btn.textContent = 'Start';
                            return;
                        }

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            const data = line.slice(6).trim();

                            if (data === 'DONE') {
                                btn.disabled = false;
                                btn.textContent = 'Start';
                                return;
                            }

                            const pipe = data.indexOf('|');
                            if (pipe === -1) continue;

                            const step = data.substring(0, pipe);
                            const msg = data.substring(pipe + 1);
                            const statusEl = document.getElementById('status');

                            // Update status
                            statusEl.textContent = msg;
                            statusEl.className = 'status';
                            if (msg.includes('✅')) statusEl.classList.add('success');
                            else if (msg.includes('Error')) statusEl.classList.add('error');
                            else if (msg.includes('wait') || msg.includes('Rate')) statusEl.classList.add('wait');

                            // Track total views
                            const viewMatch = msg.match(/Total:\s*(\d+)/);
                            if (viewMatch) {
                                totalViews = parseInt(viewMatch[1]);
                                const tvEl = document.getElementById('totalViews');
                                tvEl.textContent = 'Total views sent: ' + totalViews;
                                tvEl.style.display = 'block';
                            }

                            // Add to log
                            const logEl = document.getElementById('log');
                            const entry = document.createElement('div');
                            entry.className = 'log-entry';
                            entry.textContent = msg;
                            logEl.insertBefore(entry, logEl.firstChild);

                            // Keep log manageable
                            while (logEl.children.length > 50) {
                                logEl.removeChild(logEl.lastChild);
                            }
                        }
                        read();
                    });
                }
                read();
            }).catch(err => {
                document.getElementById('status').textContent = 'Connection error: ' + err;
                document.getElementById('status').className = 'status error';
                btn.disabled = false;
                btn.textContent = 'Start';
            });
        }

        document.getElementById('url').addEventListener('keydown', e => {
            if (e.key === 'Enter') startBot();
        });
    </script>
</body>
</html>
