<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zefoy Auto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #888; margin-bottom: 24px; font-size: 14px; }
        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #0f0f0f;
            color: #fff;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #00d4ff; }
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            word-break: break-word;
        }
        .status.show { display: block; }
        .status.success { background: rgba(0, 255, 100, 0.1); color: #00ff64; border: 1px solid rgba(0, 255, 100, 0.2); }
        .status.error { background: rgba(255, 0, 0, 0.1); color: #ff4444; border: 1px solid rgba(255, 0, 0, 0.2); }
        .status.loading { background: rgba(0, 212, 255, 0.1); color: #00d4ff; border: 1px solid rgba(0, 212, 255, 0.2); }
        .status.timeout { background: rgba(255, 165, 0, 0.1); color: #ffa500; border: 1px solid rgba(255, 165, 0, 0.2); }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #00d4ff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zefoy Auto</h1>
        <p>Paste your TikTok link. We'll handle the rest.</p>
        <input type="text" id="url" placeholder="https://vm.tiktok.com/..." autocomplete="off">
        <button id="go" onclick="send()">Confirm & Send Views</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        async function send() {
            const url = document.getElementById('url').value.trim();
            const btn = document.getElementById('go');
            const status = document.getElementById('status');

            if (!url) {
                status.className = 'status show error';
                status.textContent = 'Enter a TikTok URL';
                return;
            }

            btn.disabled = true;
            status.className = 'status show loading';
            status.innerHTML = '<span class="spinner"></span>Running automation (this takes ~30-60s)...';

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 200000); // 200s client timeout

                const res = await fetch('/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url}),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await res.json();

                if (data.status === 'success') {
                    status.className = 'status show success';
                    status.textContent = data.message;
                } else if (data.status === 'timeout') {
                    status.className = 'status show timeout';
                    status.textContent = data.message + ' — Zefoy may be slow, try again';
                } else {
                    status.className = 'status show error';
                    status.textContent = data.message || 'Failed';
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    status.className = 'status show timeout';
                    status.textContent = 'Request timed out — Zefoy is very slow right now';
                } else {
                    status.className = 'status show error';
                    status.textContent = 'Network error: ' + e.message;
                }
            }

            btn.disabled = false;
        }
    </script>
</body>
</html>
