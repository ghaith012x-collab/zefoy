<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zefoy Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 16px 24px;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 22px;
    background: linear-gradient(90deg, #00d2ff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .global-stats {
    display: flex;
    gap: 18px;
    font-size: 13px;
    color: #888;
  }
  .header .global-stats span { color: #00d2ff; font-weight: bold; }

  .container {
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ── New Session Bar ── */
  .new-session {
    background: #12121f;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .new-session select {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 9px 12px;
    color: #fff;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    min-width: 130px;
    appearance: auto;
  }
  .new-session select:focus { border-color: #7b2ff7; }
  .new-session input {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 9px 14px;
    color: #fff;
    font-size: 13px;
    outline: none;
    min-width: 180px;
  }
  .new-session input:focus { border-color: #7b2ff7; }
  .new-session input::placeholder { color: #555; }
  .new-session button {
    background: linear-gradient(135deg, #7b2ff7, #00d2ff);
    border: none;
    border-radius: 8px;
    padding: 9px 20px;
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  .new-session button:hover { opacity: 0.85; }
  .new-session button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Sessions Container — scrollable ── */
  .sessions-wrap {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }
  .sessions-wrap::-webkit-scrollbar { width: 6px; }
  .sessions-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .sessions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 10px;
    align-content: start;
  }

  /* ── Session Cards ── */
  .session-card {
    background: #12121f;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
    display: flex;
    flex-direction: column;
  }
  .session-card:hover { border-color: #444; }
  .session-card.active { border-color: #7b2ff7; }

  .session-header {
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .session-header:hover { background: #1a1a2e; }

  .session-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .session-info {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .session-name {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
  }
  .service-tag {
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    background: rgba(123, 47, 247, 0.2);
    color: #b388ff;
    white-space: nowrap;
  }
  .session-url {
    color: #555;
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .session-bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .session-stats {
    display: flex;
    gap: 12px;
    font-size: 12px;
  }
  .stat { color: #888; }
  .stat b { color: #00d2ff; }

  .status-badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }
  .status-running { background: rgba(0, 210, 100, 0.15); color: #00d264; }
  .status-starting { background: rgba(255, 170, 0, 0.15); color: #ffaa00; }
  .status-stopping { background: rgba(255, 100, 0, 0.15); color: #ff6400; }
  .status-stopped { background: rgba(128, 128, 128, 0.15); color: #888; }
  .status-error { background: rgba(255, 50, 50, 0.15); color: #ff3232; }

  .session-actions {
    display: flex;
    gap: 4px;
  }
  .session-actions button {
    background: #2a2a3e;
    border: 1px solid #444;
    border-radius: 5px;
    padding: 3px 10px;
    color: #ccc;
    font-size: 11px;
    cursor: pointer;
  }
  .session-actions button.stop-btn { border-color: #ff3232; color: #ff3232; }
  .session-actions button.remove-btn { border-color: #666; color: #888; }
  .session-actions button:hover { background: #333; }

  /* ── Session Detail (logs) ── */
  .session-detail {
    display: none;
    border-top: 1px solid #1e1e32;
  }
  .session-detail.open { display: block; }

  .session-detail-inner {
    padding: 10px 16px 14px;
  }

  .countdown-bar {
    background: linear-gradient(90deg, rgba(123, 47, 247, 0.2), rgba(0, 210, 255, 0.2));
    border-radius: 6px;
    padding: 8px 14px;
    margin-bottom: 8px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    display: none;
  }
  .countdown-bar.visible { display: block; }

  .log-box {
    background: #0a0a14;
    border: 1px solid #1e1e32;
    border-radius: 6px;
    padding: 10px;
    max-height: 220px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 11px;
    line-height: 1.5;
  }
  .log-box::-webkit-scrollbar { width: 5px; }
  .log-box::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .log-line { color: #aaa; }
  .log-line:last-child { color: #fff; }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: #444;
    grid-column: 1 / -1;
  }
  .empty-state .icon { font-size: 42px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Zefoy Bot</h1>
  <div class="global-stats">
    <div>Active: <span id="globalActive">0</span></div>
    <div>Total: <span id="globalSessions">0</span></div>
  </div>
</div>

<div class="container">
  <div class="new-session">
    <select id="serviceSelect">
      <option value="views">👁️ Views</option>
      <option value="hearts">❤️ Hearts</option>
      <option value="shares">🔄 Shares</option>
      <option value="favorites">⭐ Favorites</option>
      <option value="followers">👥 Followers</option>
    </select>
    <input type="text" id="urlInput" placeholder="Paste TikTok URL..." />
    <button id="startBtn" onclick="startSession()">▶ Start</button>
  </div>

  <div class="sessions-wrap">
    <div id="sessionsContainer" class="sessions-grid">
      <div class="empty-state" id="emptyState">
        <div class="icon">🚀</div>
        <p>Choose a service, paste a TikTok URL, and hit Start!</p>
      </div>
    </div>
  </div>
</div>

<script>
const MAX_LOG_LINES = 200;
const sessionElements = {};  // sid → {card, logBox, countdownBar, logCount}
let globalStream = null;

function startSession() {
  const url = document.getElementById('urlInput').value.trim();
  const service = document.getElementById('serviceSelect').value;
  if (!url) return;

  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '⏳...';

  fetch('/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url, service}),
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    btn.textContent = '▶ Start';
    if (data.error) { alert(data.error); return; }
    document.getElementById('urlInput').value = '';
    addSessionCard(data);
    ensureGlobalStream();
    updateGlobalStats();
  })
  .catch(err => {
    alert('Failed: ' + err);
    btn.disabled = false;
    btn.textContent = '▶ Start';
  });
}

function addSessionCard(session) {
  document.getElementById('emptyState')?.remove();

  const card = document.createElement('div');
  card.className = 'session-card';
  card.id = `session-${session.id}`;

  const unitLabel = capitalize(session.unit || 'count');

  card.innerHTML = `
    <div class="session-header" onclick="toggleSession(${session.id})">
      <div class="session-top-row">
        <div class="session-info">
          <span class="session-name">#${session.id}</span>
          <span class="service-tag">${session.serviceEmoji || ''} ${session.serviceName || 'Views'}</span>
        </div>
        <div class="session-actions">
          <button class="stop-btn" id="stopbtn-${session.id}" onclick="event.stopPropagation(); stopSession(${session.id})">■ Stop</button>
          <button class="remove-btn" id="rmbtn-${session.id}" style="display:none" onclick="event.stopPropagation(); removeSession(${session.id})">✕</button>
        </div>
      </div>
      <div class="session-bottom-row">
        <div class="session-stats">
          <span class="stat">${unitLabel}: <b id="count-${session.id}">0</b></span>
          <span class="stat">Cycles: <b id="cycles-${session.id}">0</b></span>
        </div>
        <span class="status-badge status-${session.status}" id="status-${session.id}">${session.status}</span>
      </div>
      <div class="session-url" title="${escHtml(session.url)}">${escHtml(session.url)}</div>
    </div>
    <div class="session-detail" id="detail-${session.id}">
      <div class="session-detail-inner">
        <div class="countdown-bar" id="countdown-${session.id}"></div>
        <div class="log-box" id="logs-${session.id}"></div>
      </div>
    </div>
  `;

  document.getElementById('sessionsContainer').prepend(card);

  sessionElements[session.id] = {
    card,
    logBox: card.querySelector(`#logs-${session.id}`),
    countdownBar: card.querySelector(`#countdown-${session.id}`),
    logCount: 0,
    unit: session.unit || 'count',
  };
}

function toggleSession(sid) {
  const detail = document.getElementById(`detail-${sid}`);
  const card = document.getElementById(`session-${sid}`);
  if (!detail || !card) return;
  const isOpen = detail.classList.contains('open');

  // Close all
  document.querySelectorAll('.session-detail.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.session-card.active').forEach(c => c.classList.remove('active'));

  if (!isOpen) {
    detail.classList.add('open');
    card.classList.add('active');
    const logBox = document.getElementById(`logs-${sid}`);
    if (logBox) logBox.scrollTop = logBox.scrollHeight;
  }
}

/* ── Single multiplexed SSE stream ── */
function ensureGlobalStream() {
  if (globalStream && globalStream.readyState !== EventSource.CLOSED) return;

  globalStream = new EventSource('/stream/all');

  globalStream.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      const sid = msg.sid;
      const el = sessionElements[sid];
      if (!el) return;

      if (msg.type === 'log') {
        const line = document.createElement('div');
        line.className = 'log-line';
        line.textContent = msg.text;
        el.logBox.appendChild(line);
        el.logCount++;

        // Cap log lines
        while (el.logCount > MAX_LOG_LINES) {
          el.logBox.removeChild(el.logBox.firstChild);
          el.logCount--;
        }

        // Auto-scroll if near bottom
        if (el.logBox.scrollHeight - el.logBox.scrollTop - el.logBox.clientHeight < 80) {
          el.logBox.scrollTop = el.logBox.scrollHeight;
        }
      }

      else if (msg.type === 'countdown') {
        if (msg.text) {
          el.countdownBar.textContent = msg.text;
          el.countdownBar.classList.add('visible');
        } else {
          el.countdownBar.classList.remove('visible');
        }
      }

      else if (msg.type === 'stats') {
        const countEl = document.getElementById(`count-${sid}`);
        const cyclesEl = document.getElementById(`cycles-${sid}`);
        const statusEl = document.getElementById(`status-${sid}`);
        if (countEl) countEl.textContent = (msg.count || 0).toLocaleString();
        if (cyclesEl) cyclesEl.textContent = msg.cycles;
        if (statusEl) {
          statusEl.textContent = msg.status;
          statusEl.className = `status-badge status-${msg.status}`;
        }
        if (msg.status === 'stopped' || msg.status === 'error') {
          const stopBtn = document.getElementById(`stopbtn-${sid}`);
          const rmBtn = document.getElementById(`rmbtn-${sid}`);
          if (stopBtn) stopBtn.style.display = 'none';
          if (rmBtn) rmBtn.style.display = '';
        }
        updateGlobalStats();
      }

      else if (msg.type === 'ended') {
        el.countdownBar.classList.remove('visible');
      }
    } catch(e) {}
  };

  globalStream.onerror = () => {
    // EventSource auto-reconnects
  };
}

function stopSession(sid) {
  fetch(`/stop/${sid}`, {method: 'POST'}).then(r => r.json()).then(() => {
    const statusEl = document.getElementById(`status-${sid}`);
    if (statusEl) { statusEl.textContent = 'stopping'; statusEl.className = 'status-badge status-stopping'; }
  });
}

function removeSession(sid) {
  fetch(`/remove/${sid}`, {method: 'POST'}).then(r => r.json()).then(data => {
    if (data.ok) {
      const card = document.getElementById(`session-${sid}`);
      if (card) card.remove();
      delete sessionElements[sid];
      updateGlobalStats();
      // Show empty state if no sessions left
      if (Object.keys(sessionElements).length === 0) {
        const grid = document.getElementById('sessionsContainer');
        grid.innerHTML = '<div class="empty-state" id="emptyState"><div class="icon">🚀</div><p>Choose a service, paste a TikTok URL, and hit Start!</p></div>';
      }
    }
  });
}

function updateGlobalStats() {
  const cards = document.querySelectorAll('.session-card');
  const active = document.querySelectorAll('.status-running, .status-starting').length;
  document.getElementById('globalSessions').textContent = cards.length;
  document.getElementById('globalActive').textContent = active;
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Restore existing sessions on page load ──
window.addEventListener('load', () => {
  fetch('/sessions').then(r => r.json()).then(sessions => {
    if (sessions.length > 0) {
      sessions.forEach(s => {
        addSessionCard(s);
        const countEl = document.getElementById(`count-${s.id}`);
        const cyclesEl = document.getElementById(`cycles-${s.id}`);
        const statusEl = document.getElementById(`status-${s.id}`);
        if (countEl) countEl.textContent = (s.count || 0).toLocaleString();
        if (cyclesEl) cyclesEl.textContent = s.cycles;
        if (statusEl) { statusEl.textContent = s.status; statusEl.className = `status-badge status-${s.status}`; }
        if (s.status === 'stopped' || s.status === 'error') {
          const stopBtn = document.getElementById(`stopbtn-${s.id}`);
          const rmBtn = document.getElementById(`rmbtn-${s.id}`);
          if (stopBtn) stopBtn.style.display = 'none';
          if (rmBtn) rmBtn.style.display = '';
        }
      });
      ensureGlobalStream();
    }
    updateGlobalStats();
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement.id === 'urlInput') startSession();
});
</script>
</body>
</html>
