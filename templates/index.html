<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zefoy Views Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 20px 30px;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 24px;
    background: linear-gradient(90deg, #00d2ff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .global-stats {
    display: flex;
    gap: 20px;
    font-size: 14px;
    color: #888;
  }
  .header .global-stats span { color: #00d2ff; font-weight: bold; }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
  }

  /* ── New Session Bar ── */
  .new-session {
    background: #12121f;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .new-session input {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 16px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .new-session input:focus { border-color: #7b2ff7; }
  .new-session input::placeholder { color: #555; }
  .new-session button {
    background: linear-gradient(135deg, #7b2ff7, #00d2ff);
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .new-session button:hover { opacity: 0.85; }
  .new-session button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Session Cards ── */
  .sessions-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .session-card {
    background: #12121f;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .session-card:hover { border-color: #444; }
  .session-card.active { border-color: #7b2ff7; }

  .session-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .session-header:hover { background: #1a1a2e; }

  .session-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .session-name {
    font-weight: 600;
    font-size: 15px;
  }
  .session-url {
    color: #666;
    font-size: 12px;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-running { background: rgba(0, 210, 100, 0.15); color: #00d264; }
  .status-starting { background: rgba(255, 170, 0, 0.15); color: #ffaa00; }
  .status-stopping { background: rgba(255, 100, 0, 0.15); color: #ff6400; }
  .status-stopped { background: rgba(128, 128, 128, 0.15); color: #888; }
  .status-error { background: rgba(255, 50, 50, 0.15); color: #ff3232; }

  .session-stats {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 13px;
  }
  .stat { color: #888; }
  .stat b { color: #00d2ff; }

  .session-actions button {
    background: #2a2a3e;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 5px 12px;
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
    margin-left: 8px;
  }
  .session-actions button.stop-btn { border-color: #ff3232; color: #ff3232; }
  .session-actions button:hover { background: #333; }

  /* ── Session Detail (logs) ── */
  .session-detail {
    display: none;
    border-top: 1px solid #1e1e32;
  }
  .session-detail.open { display: block; }

  .session-detail-inner {
    padding: 12px 20px 16px;
  }

  .countdown-bar {
    background: linear-gradient(90deg, rgba(123, 47, 247, 0.2), rgba(0, 210, 255, 0.2));
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 10px;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    display: none;
  }
  .countdown-bar.visible { display: block; }

  .log-box {
    background: #0a0a14;
    border: 1px solid #1e1e32;
    border-radius: 8px;
    padding: 12px;
    max-height: 300px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .log-box::-webkit-scrollbar { width: 6px; }
  .log-box::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .log-line { color: #aaa; }
  .log-line:last-child { color: #fff; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #444;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Zefoy Views Bot</h1>
  <div class="global-stats">
    <div>Sessions: <span id="globalSessions">0</span></div>
    <div>Total Views: <span id="globalViews">0</span></div>
  </div>
</div>

<div class="container">
  <div class="new-session">
    <input type="text" id="urlInput" placeholder="Paste TikTok video URL..." />
    <button id="startBtn" onclick="startSession()">▶ Start Session</button>
  </div>

  <div id="sessionsContainer" class="sessions-grid">
    <div class="empty-state" id="emptyState">
      <div class="icon">🚀</div>
      <p>No sessions yet. Paste a TikTok URL and hit Start!</p>
    </div>
  </div>
</div>

<script>
const sessionElements = {};  // sid → {card, logBox, countdownBar, eventSource, lastLogCount}

function startSession() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Starting...';

  fetch('/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url}),
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      alert(data.error);
      btn.disabled = false;
      btn.textContent = '▶ Start Session';
      return;
    }
    document.getElementById('urlInput').value = '';
    btn.disabled = false;
    btn.textContent = '▶ Start Session';
    addSessionCard(data);
    connectStream(data.id);
  })
  .catch(err => {
    alert('Failed to start: ' + err);
    btn.disabled = false;
    btn.textContent = '▶ Start Session';
  });
}

function addSessionCard(session) {
  document.getElementById('emptyState')?.remove();

  const card = document.createElement('div');
  card.className = 'session-card';
  card.id = `session-${session.id}`;

  card.innerHTML = `
    <div class="session-header" onclick="toggleSession(${session.id})">
      <div class="session-info">
        <span class="session-name">Session ${session.id}</span>
        <span class="session-url" title="${escHtml(session.url)}">${escHtml(session.url)}</span>
      </div>
      <div class="session-stats">
        <span class="stat">Views: <b id="views-${session.id}">0</b></span>
        <span class="stat">Cycles: <b id="cycles-${session.id}">0</b></span>
        <span class="status-badge status-${session.status}" id="status-${session.id}">${session.status}</span>
        <span class="session-actions">
          <button class="stop-btn" id="stopbtn-${session.id}" onclick="event.stopPropagation(); stopSession(${session.id})">■ Stop</button>
        </span>
      </div>
    </div>
    <div class="session-detail" id="detail-${session.id}">
      <div class="session-detail-inner">
        <div class="countdown-bar" id="countdown-${session.id}"></div>
        <div class="log-box" id="logs-${session.id}"></div>
      </div>
    </div>
  `;

  document.getElementById('sessionsContainer').appendChild(card);

  sessionElements[session.id] = {
    card,
    logBox: card.querySelector(`#logs-${session.id}`),
    countdownBar: card.querySelector(`#countdown-${session.id}`),
    lastLogCount: 0,
  };

  updateGlobalStats();
}

function toggleSession(sid) {
  const detail = document.getElementById(`detail-${sid}`);
  const card = document.getElementById(`session-${sid}`);
  const isOpen = detail.classList.contains('open');

  // Close all
  document.querySelectorAll('.session-detail').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.session-card').forEach(c => c.classList.remove('active'));

  if (!isOpen) {
    detail.classList.add('open');
    card.classList.add('active');
    // Auto-scroll log to bottom
    const logBox = document.getElementById(`logs-${sid}`);
    logBox.scrollTop = logBox.scrollHeight;
  }
}

function connectStream(sid) {
  const es = new EventSource(`/stream/${sid}`);
  if (sessionElements[sid]) sessionElements[sid].eventSource = es;

  es.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      const el = sessionElements[sid];
      if (!el) return;

      if (msg.type === 'log') {
        const line = document.createElement('div');
        line.className = 'log-line';
        line.textContent = msg.text;
        el.logBox.appendChild(line);
        // Auto-scroll if near bottom
        if (el.logBox.scrollHeight - el.logBox.scrollTop - el.logBox.clientHeight < 100) {
          el.logBox.scrollTop = el.logBox.scrollHeight;
        }
      }

      else if (msg.type === 'countdown') {
        if (msg.text) {
          el.countdownBar.textContent = msg.text;
          el.countdownBar.classList.add('visible');
        } else {
          el.countdownBar.classList.remove('visible');
        }
      }

      else if (msg.type === 'stats') {
        document.getElementById(`views-${sid}`).textContent = msg.views.toLocaleString();
        document.getElementById(`cycles-${sid}`).textContent = msg.cycles;
        const statusEl = document.getElementById(`status-${sid}`);
        statusEl.textContent = msg.status;
        statusEl.className = `status-badge status-${msg.status}`;
        if (msg.status === 'stopped' || msg.status === 'error') {
          document.getElementById(`stopbtn-${sid}`).style.display = 'none';
        }
        updateGlobalStats();
      }

      else if (msg.type === 'ended') {
        es.close();
        el.countdownBar.classList.remove('visible');
      }
    } catch(e) {}
  };

  es.onerror = () => {
    // Will auto-reconnect via EventSource
  };
}

function stopSession(sid) {
  fetch(`/stop/${sid}`, {method: 'POST'})
    .then(r => r.json())
    .then(() => {
      const statusEl = document.getElementById(`status-${sid}`);
      statusEl.textContent = 'stopping';
      statusEl.className = 'status-badge status-stopping';
    });
}

function updateGlobalStats() {
  const cards = document.querySelectorAll('.session-card');
  document.getElementById('globalSessions').textContent = cards.length;

  let totalViews = 0;
  cards.forEach(card => {
    const sid = card.id.replace('session-', '');
    const viewsEl = document.getElementById(`views-${sid}`);
    if (viewsEl) totalViews += parseInt(viewsEl.textContent.replace(/,/g, '')) || 0;
  });
  document.getElementById('globalViews').textContent = totalViews.toLocaleString();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── On page load: restore existing sessions ──
window.addEventListener('load', () => {
  fetch('/sessions')
    .then(r => r.json())
    .then(sessions => {
      if (sessions.length > 0) {
        sessions.forEach(s => {
          addSessionCard(s);
          // Update stats from saved state
          document.getElementById(`views-${s.id}`).textContent = s.views.toLocaleString();
          document.getElementById(`cycles-${s.id}`).textContent = s.cycles;
          const statusEl = document.getElementById(`status-${s.id}`);
          statusEl.textContent = s.status;
          statusEl.className = `status-badge status-${s.status}`;
          if (s.status === 'stopped' || s.status === 'error') {
            document.getElementById(`stopbtn-${s.id}`).style.display = 'none';
          }
          // Reconnect stream for active sessions
          if (s.status === 'running' || s.status === 'starting') {
            connectStream(s.id);
          }
        });
      }
    });
});

// Enter key to start
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement.id === 'urlInput') {
    startSession();
  }
});
</script>
</body>
</html>
